upstream wordlegame {
    server wordlegame:8000;
}

upstream statservice {
    server statservice:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 4G;
    keepalive_timeout 5;

    location /api/ {
        proxy_pass http://wordlegame;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /stats/ {
        proxy_pass http://statservice;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}